# P013 Session Configuration
# Default values match IRB protocol. Edit before session if needed.
# Changes here are picked up by the launcher GUI at session start.

session:
  participant_id: ""  # Set at launch
  session_date: ""    # Auto-filled

task00_questionnaire:
  # P013 Pre-Session Questionnaire (POMS + FFMQ + PSQI + ESS + SSS).
  # Owned by the IACS team; responses land in the "P013 PRE" Google Sheet.
  form_url: "https://docs.google.com/forms/d/e/1FAIpQLSfSJjvXKt1CDbdW17_mOkpSndQk1DqgFoOjVbkAShDR7eNagA/viewform"
  # Pre-fill the participant ID into the form's first question so the
  # participant only has to review it rather than retype. The entry ID
  # below corresponds to "What is your Participant ID?" on the current
  # form (extracted from FB_PUBLIC_LOAD_DATA_ on 2026-04-17).
  prefill_participant_id: true
  participant_id_entry_id: "entry.1536440908"
  # Substring we watch for in the webview URL to detect a successful
  # submit. Google's post-submit URL is
  #   https://docs.google.com/forms/u/0/d/e/<FORM_ID>/formResponse
  # so "formResponse" is a robust match regardless of locale or query
  # string.
  submission_url_marker: "formResponse"
  window_title: "P013 Pre-Session Questionnaire"
  fullscreen: true
  # Demo mode bypasses the form entirely (task00_demo_skipped marker).
  demo_skip: true

task01_oddball:
  total_trials: 250
  deviant_probability: 0.20
  isi_min_ms: 1100
  isi_max_ms: 1500
  tone_duration_ms: 100
  rise_fall_ms: 10
  response_window_ms: 1000
  volume: 1.0
  max_consecutive_standards: 4  # min feasible for 200/50 split = ceil(200/51) = 4
  # Practice gate (run before main task; repeats until participant passes).
  # Structure is fixed in code: one deviant per gap size in {1,2,3,4}, gaps
  # shuffled per attempt. That's always 4 deviants + 10 standards = 14
  # trials, ~15 s at the shorter practice-only timings below. The shorter
  # response window / ISI don't affect the main ERP CORE timings above.
  practice_response_window_ms: 800
  practice_isi_min_ms: 200
  practice_isi_max_ms: 400
  practice_hit_threshold: 0.75
  practice_fa_ceiling: 0.50

task02_rgb_illuminance:
  trials_per_color: 100
  trial_duration_min_s: 1.2
  trial_duration_max_s: 2.0
  colors: ["red", "green", "blue"]
  iti_duration_ms: 200          # gray screen + fixation between colors
  break_interval_trials: 100    # break every N trials (after trial 100, 200; not 300)
  break_duration_s: 30

task03_backward_masking:
  total_trials: 275
  catch_trial_proportion: 0.17
  mask_duration_ms: 200
  fixation_duration_ms: 500
  response_window_ms: 1500
  # Practice (familiarization only -- no performance gate)
  practice_trials: 8
  practice_face_trials: 6
  practice_catch_trials: 2
  practice_soa_ms: 200
  # Response keys
  response_key_seen: "f"
  response_key_unseen: "j"
  response_key_unsure: "space"
  # QUEST staircase (targets 50% detection threshold)
  quest_beta: 3.5
  quest_delta: 0.01
  quest_gamma: 0.02
  quest_grain: 1
  soa_min_ms: 17
  soa_max_ms: 500
  soa_start_ms: 100
  # Stimulus handling
  # 768 px gives a face about a third of a 1080p screen's height, i.e. large
  # and easily visible at normal viewing distance. The underlying KDEF crops
  # are 562 px so this upsamples ~1.4x — PsychoPy interpolates, no pixelation.
  face_size_px: 768
  n_mondrian_masks: 100
  min_face_identities: 10
  # Mask bank used for the backward-masking overlay. Two options, both
  # committed to the repo so they're swappable without regeneration:
  #   "hybrid"   -- Mondrian + block-scrambled KDEF face composite
  #                 (stimuli/masks_hybrid/). Default. Masks the mid-SF
  #                 face-identity band that pure Mondrians leave exposed.
  #   "mondrian" -- original pure-Mondrian bank (stimuli/masks/). Kept
  #                 as a fallback and a baseline for any post-hoc
  #                 comparison of mask-type effects.
  # Set via scripts/generate_hybrid_masks.py and
  # scripts/generate_mondrians.py respectively.
  mask_type: "hybrid"
  # Mid-task spacebar-gated break. Integer = main-task trial number to
  # break AFTER (participant presses space to resume). ``null`` means
  # "halfway" — auto-computed as ``total_trials // 2``. ``0`` disables
  # the break entirely. Emits task03_break_start / task03_break_end on
  # P013_Task_Markers so analysis can exclude the pause window.
  break_after_main_trial: null
  # ImageStim.contrast applied to the face target (1.0 = native KDEF
  # contrast, 0.5 = half signal, 0 = grey). Pilots on 2026-04-17 showed
  # that high-sensitivity participants saturate at 100% seen even at
  # the 17 ms floor SOA; dropping contrast to 0.5 pushed the 50%
  # threshold to a real within-range SOA (24 ms in the Nicco pilot) so
  # QUEST can do its job. Lower values make the task harder.
  face_contrast: 0.5
  # Target face duration per trial, in ms. ``null`` (default) means
  # "auto-detect from the monitor's actual refresh rate at runtime"
  # (60 Hz → 17, 120 Hz → 8, etc.). Setting an explicit integer pins
  # the value — useful for headless tests and for reproducing a run on
  # different hardware.
  face_frame_ms: null

task04_mind_state:
  game_duration_s: 300
  break_duration_s: 60
  # meditation_duration_s is the SILENCE between the two gongs (added to
  # the audio-instructions length + gong durations for total block time).
  meditation_duration_s: 360
  game_start_speed: 1.0
  game_max_speed: 2.5
  game_speed_increment_interval_s: 30
  jump_min_height: 80
  jump_max_height: 200
  jump_hold_max_ms: 300
  obstacle_types: ["spike", "tall_rect", "low_barrier"]
  gong_file: "assets/sounds/Simple_Gong.wav"
  meditation_instructions_audio: "assets/sounds/meditation_instructions.mp3"

task05_ssvep:
  # Carrier frequencies sent to the Vayl desktop app. Pattern-reversal
  # produces an effective SSVEP frequency of 2x the carrier, so these
  # values correspond to 40 Hz -> 1 Hz effective stimulation.
  carrier_start_hz: 20.0
  carrier_end_hz: 0.5
  ramp_duration_s: 300
  vayl_lsl_stream_name: "VaylStim"
  vayl_api_url: "http://127.0.0.1:9471"
  vayl_emit_frequency_stream: false   # omit the 250Hz VaylStim_Freq outlet; markers fold into P013_Task_Markers
  vayl_lab_opaque: true               # unit-amplitude LAP bypass (required for pattern-reversal SSVEP)
  vayl_checkerboard_enabled: true     # force checkerboard visual mode for this task
  vayl_checker_size: 100              # pixels per checker square
